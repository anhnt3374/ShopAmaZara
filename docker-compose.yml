services:
  mysql:
    image: mysql:8.0
    container_name: amazara-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-amazara}
      MYSQL_USER: ${MYSQL_USER:-amazara}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-amazara}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - amazara_mysql_data:/var/lib/mysql
      - ./backend/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: amazara-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-amazara}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-amazara}
      DATABASE_NAME: ${MYSQL_DATABASE:-amazara}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - amazara_backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: amazara-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - amazara_frontend_node_modules:/app/node_modules

volumes:
  amazara_mysql_data:
  amazara_backend_node_modules:
  amazara_frontend_node_modules:
