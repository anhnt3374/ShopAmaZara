services:
  mysql:
    image: mysql:8.0
    container_name: amazara-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-amazara}
      MYSQL_USER: ${MYSQL_USER:-amazara}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-amazara}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - amazara_mysql_data:/var/lib/mysql
      - ./backend/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: amazara-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    environment:
      PORT: 3000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-amazara}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-amazara}
      DATABASE_NAME: ${MYSQL_DATABASE:-amazara}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      TEXT_EMBED_URL: ${TEXT_EMBED_URL:-http://text-embed:8000}
      IMAGE_EMBED_URL: ${IMAGE_EMBED_URL:-http://image-embed:8000}
      EMBEDDINGS_ENABLED: ${EMBEDDINGS_ENABLED:-true}
      EMBED_BATCH_SIZE: ${EMBED_BATCH_SIZE:-32}
      EMBED_REQUEST_TIMEOUT_MS: ${EMBED_REQUEST_TIMEOUT_MS:-30000}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-products}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SEARCH_CACHE_TTL_MS: ${SEARCH_CACHE_TTL_MS:-60000}
      QUERY_CACHE_THRESHOLD: ${QUERY_CACHE_THRESHOLD:-0.97}
      QUERY_CACHE_TTL_MS: ${QUERY_CACHE_TTL_MS:-300000}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - amazara_backend_node_modules:/app/node_modules
      - ./products.enriched.csv:/app/products.enriched.csv:ro
      - ./products.csv:/app/products.csv:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: amazara-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - amazara_frontend_node_modules:/app/node_modules

  text-embed:
    build:
      context: ./ml/text-embed
    container_name: amazara-text-embed
    restart: unless-stopped
    environment:
      TEXT_EMBED_MODEL: ${TEXT_EMBED_MODEL:-BAAI/bge-small-en-v1.5}
      EMBED_DEVICE: ${EMBED_DEVICE:-cuda}
      HF_HOME: /hf_cache
    volumes:
      - hf_cache:/hf_cache
    ports:
      - "8001:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  image-embed:
    build:
      context: ./ml/image-embed
    container_name: amazara-image-embed
    restart: unless-stopped
    environment:
      IMAGE_EMBED_MODEL: ${IMAGE_EMBED_MODEL:-qihoo360/fg-clip2-base}
      EMBED_DEVICE: ${EMBED_DEVICE:-cuda}
      IMAGE_ATTN_IMPL: ${IMAGE_ATTN_IMPL:-eager}
      HF_HOME: /hf_cache
    volumes:
      - hf_cache:/hf_cache
    ports:
      - "8002:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: amazara-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: amazara-redis
    restart: unless-stopped
    # Pure cache — persistence off; entries expire via per-key TTL.
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

volumes:
  amazara_mysql_data:
  amazara_backend_node_modules:
  amazara_frontend_node_modules:
  hf_cache:
  qdrant_storage:
