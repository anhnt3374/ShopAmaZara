services:
  # Production build served via nginx on port 8080.
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: amazara:latest
    container_name: amazara-web
    ports:
      - "8080:80"
    restart: unless-stopped

  # Dev server with HMR. Run with: docker compose --profile dev up
  dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: amazara-dev:latest
    container_name: amazara-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
