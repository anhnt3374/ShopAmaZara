</div>
</div>
<div class="space-y-1.5">

<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">lock</span>

</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface" id="remember" type="checkbox"/>
<label class="ml-2 text-body-sm font-body-sm text-on-surface-variant" for="remember">Remember for 30 days</label>
</div>
<a class="text-label-md font-label-md text-primary hover:underline" href="#">Forgot password?</a>
</div>
