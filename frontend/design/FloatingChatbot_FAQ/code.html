<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NexusMarket Support</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#dce9ff",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#85145a",
                        "surface-container": "#e5eeff",
                        "primary": "#00288e",
                        "secondary-container": "#fea619",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#b8c4ff",
                        "on-tertiary-fixed": "#3d0026",
                        "on-primary-fixed": "#001453",
                        "tertiary-fixed": "#ffd8e7",
                        "primary-container": "#1e40af",
                        "surface-container-low": "#eff4ff",
                        "on-secondary-fixed": "#2a1700",
                        "outline": "#757684",
                        "tertiary-fixed-dim": "#ffafd3",
                        "outline-variant": "#c4c5d5",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f8f9ff",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#173bab",
                        "on-secondary-container": "#684000",
                        "primary-fixed": "#dde1ff",
                        "surface-tint": "#3755c3",
                        "tertiary-container": "#8b1a5e",
                        "surface-dim": "#cbdbf5",
                        "surface-bright": "#f8f9ff",
                        "on-background": "#0b1c30",
                        "secondary-fixed-dim": "#ffb95f",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#213145",
                        "on-surface": "#0b1c30",
                        "error-container": "#ffdad6",
                        "secondary": "#855300",
                        "inverse-primary": "#b8c4ff",
                        "inverse-on-surface": "#eaf1ff",
                        "on-tertiary-container": "#ff9dcc",
                        "on-secondary-fixed-variant": "#653e00",
                        "surface-container-highest": "#d3e4fe",
                        "on-surface-variant": "#444653",
                        "on-primary-container": "#a8b8ff",
                        "secondary-fixed": "#ffddb8",
                        "surface-variant": "#d3e4fe",
                        "tertiary": "#6a0045",
                        "surface": "#f8f9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "margin-desktop": "40px",
                        "container-max": "1280px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "data-mono": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "data-mono": ["13px", { "lineHeight": "18px", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen relative font-sans text-on-background">
<!-- Mock Background Content to give context to the floating widget -->
<div class="max-w-container-max mx-auto px-margin-desktop py-margin-desktop">
<div class="h-[800px] w-full rounded-xl bg-surface-container-low border border-outline-variant flex items-center justify-center opacity-50">
<span class="font-headline-lg text-headline-lg text-outline">Main Application Canvas</span>
</div>
</div>
<!-- Floating Chatbot Widget (FAQ Tab) -->
<div class="fixed bottom-gutter right-gutter w-[360px] h-[520px] bg-surface rounded-xl flex flex-col shadow-[0px_10px_30px_rgba(15,23,42,0.12)] border border-outline-variant z-50 overflow-hidden">
<!-- Header -->
<div class="bg-primary-container text-on-primary-container px-unit py-unit flex items-center justify-between shrink-0 h-16">
<div class="flex items-center gap-2 pl-2">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">support_agent</span>
<h2 class="font-headline-md text-headline-md text-on-primary-container">Nexus Support</h2>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-on-primary-container/10 transition-colors">
<span class="material-symbols-outlined text-on-primary-container">close</span>
</button>
</div>
<!-- Main Content (FAQ List) -->
<div class="flex-1 overflow-y-auto bg-surface p-unit flex flex-col gap-2">
<div class="px-2 py-3">
<h3 class="font-label-md text-label-md text-on-surface-variant mb-1">Frequently Asked Questions</h3>
<p class="font-body-sm text-body-sm text-outline">Find quick answers to common issues.</p>
</div>
<!-- FAQ Items -->
<button class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-low transition-colors text-left group">
<span class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Làm thế nào để theo dõi đơn hàng?</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-low transition-colors text-left group">
<span class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Chính sách đổi trả hàng là gì?</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-low transition-colors text-left group">
<span class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Làm sao để liên hệ người bán?</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-low transition-colors text-left group">
<span class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Thời gian giao hàng dự kiến?</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-low transition-colors text-left group">
<span class="font-body-md text-body-md text-on-surface group-hover:text-primary transition-colors">Các phương thức thanh toán?</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</button>
</div>
<!-- Bottom Navigation -->
<div class="h-16 border-t border-outline-variant bg-surface flex items-center justify-around shrink-0 px-2">
<!-- Home (Inactive) -->
<button class="flex flex-col items-center justify-center w-16 h-full gap-1 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">home</span>
<span class="font-label-md text-[10px] leading-tight font-semibold">Home</span>
</button>
<!-- Chat (Inactive) -->
<button class="flex flex-col items-center justify-center w-16 h-full gap-1 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">chat</span>
<span class="font-label-md text-[10px] leading-tight font-semibold">Chat</span>
</button>
<!-- FAQ (Active) -->
<button class="flex flex-col items-center justify-center w-16 h-full gap-1 text-primary relative">
<div class="absolute -top-px left-0 right-0 h-[2px] bg-primary"></div>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">quiz</span>
<span class="font-label-md text-[10px] leading-tight font-semibold">FAQ</span>
</button>
</div>
</div>
</body></html>
